<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<meta name="theme-color" content="#00e5ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+JP:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #00c896;
    --error: #ff4d6d;
    --nav-height: 64px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans JP', sans-serif;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,229,255,0.08) 0%, transparent 60%);
    background-attachment: fixed;
  }

  #app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Tab panels ── */
  .tab-panel {
    display: none;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px calc(var(--nav-height) + var(--safe-bottom) + 16px);
  }
  .tab-panel.active { display: block; }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-height) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(19,19,26,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .bottom-nav button {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    min-height: 44px;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-nav button.active { color: var(--accent); }
  .bottom-nav button svg { width: 22px; height: 22px; stroke-width: 1.8; }

  /* ── Page header ── */
  .page-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .page-header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .page-header-text h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .page-header-text p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .page-header-right { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── Section label ── */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label::before {
    content: '';
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px; display: block;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary .shimmer {
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { to { left: 100%; } }

  .btn-secondary {
    width: 100%; padding: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:active { background: rgba(255,255,255,0.08); }

  .btn-ghost {
    background: none; border: none;
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; cursor: pointer;
    padding: 8px 12px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-ghost:active { color: var(--text); background: rgba(255,255,255,0.05); }

  .btn-danger {
    width: 100%; padding: 12px;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.3); border-radius: 10px;
    color: var(--error);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-danger:active { background: rgba(255,77,109,0.16); }

  .btn-icon {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-size: 16px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-icon:active { color: var(--text); background: rgba(255,255,255,0.08); }

  /* ── Template cards ── */
  .template-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .template-card:active { background: rgba(0,229,255,0.04); border-color: rgba(0,229,255,0.3); }
  .template-card-icon {
    width: 40px; height: 40px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .template-card-body { flex: 1; min-width: 0; }
  .template-card-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .template-card-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
  .template-card-actions { display: flex; gap: 4px; }

  /* ── Recent session cards ── */
  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .session-card-header {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .session-card-header:active { background: rgba(255,255,255,0.03); }
  .session-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--accent); font-weight: 600;
    min-width: 48px;
  }
  .session-info { flex: 1; min-width: 0; }
  .session-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .session-meta { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .session-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .session-card.expanded .session-chevron { transform: rotate(90deg); }
  .session-detail {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }
  .session-card.expanded .session-detail { display: block; }
  .session-exercise-row { padding: 8px 0; border-bottom: 1px solid rgba(42,42,58,0.5); }
  .session-exercise-row:last-child { border-bottom: none; }
  .session-exercise-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .session-sets { display: flex; flex-wrap: wrap; gap: 4px; }
  .session-set-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 6px;
  }
  .session-set-chip.pr {
    color: #fbbf24; border-color: rgba(251,191,36,0.4);
    background: rgba(251,191,36,0.08);
  }

  /* ── Active workout ── */
  .workout-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .workout-title-wrap { flex: 1; min-width: 0; }
  #workout-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    background: none; border: none; outline: none;
    width: 100%; color: var(--text);
    font-family: 'IBM Plex Sans JP', sans-serif;
  }
  #workout-timer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--accent);
    margin-top: 2px;
  }
  .btn-finish {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 8px;
    color: #fff; padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-finish:active { opacity: 0.85; }

  /* ── Exercise cards ── */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .exercise-card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    cursor: pointer;
    min-height: 48px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .exercise-card-header:active { background: rgba(255,255,255,0.03); }
  .exercise-card-name {
    flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
  }
  .exercise-card-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
  }
  .exercise-card.collapsed .exercise-card-body { display: none; }

  .exercise-card-body { padding: 0 0 8px; }

  .set-col-headers {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 44px;
    gap: 8px;
    padding: 4px 16px 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    border-top: 1px solid var(--border);
  }
  .set-col-headers span { text-align: center; }
  .set-col-headers span:first-child { text-align: left; }

  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 44px;
    gap: 8px;
    align-items: center;
    padding: 5px 16px;
    transition: background 0.2s;
  }
  .set-row.done { background: rgba(0,200,150,0.08); }
  .set-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--muted);
    text-align: left;
  }
  .set-row.done .set-number { color: var(--success); }

  input.set-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; /* critical: prevents iOS zoom */
    text-align: center;
    padding: 9px 4px;
    width: 100%;
    -moz-appearance: textfield;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  input.set-input::-webkit-inner-spin-button,
  input.set-input::-webkit-outer-spin-button { display: none; }
  input.set-input:focus { outline: none; border-color: var(--accent); background: rgba(0,229,255,0.04); }
  .set-row.done input.set-input { color: var(--success); border-color: rgba(0,200,150,0.3); background: rgba(0,200,150,0.05); }

  .btn-check {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    font-size: 16px;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    color: var(--muted);
  }
  .btn-check:active { background: rgba(0,200,150,0.15); }
  .set-row.done .btn-check {
    background: rgba(0,200,150,0.15);
    border-color: rgba(0,200,150,0.4);
    color: var(--success);
  }

  .btn-add-set {
    margin: 6px 16px 0;
    padding: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer; width: calc(100% - 32px);
    transition: border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-add-set:active { border-color: var(--accent); color: var(--accent); }

  /* ── Empty states ── */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 16px; text-align: center;
    gap: 12px;
  }
  .empty-state-icon { font-size: 48px; opacity: 0.4; }
  .empty-state-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .empty-state-text { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ── Modals ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    display: none;
    align-items: flex-end;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    width: 100%;
    max-height: 90dvh;
    display: flex; flex-direction: column;
    padding-bottom: calc(var(--safe-bottom) + 16px);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border); border-radius: 2px;
    margin: 12px auto 0; flex-shrink: 0;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    color: var(--accent); letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .modal-body {
    overflow-y: auto; flex: 1;
    padding: 16px 20px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Exercise search modal ── */
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'IBM Plex Sans JP', sans-serif;
    font-size: 16px; /* critical: no iOS zoom */
    padding: 12px 14px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .ex-category-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--accent2); letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 0 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .ex-category-label::before {
    content: ''; width: 3px; height: 10px;
    background: var(--accent2); border-radius: 2px;
  }

  .ex-item {
    display: flex; align-items: center;
    padding: 11px 12px;
    border-radius: 8px; cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
    -webkit-tap-highlight-color: transparent;
  }
  .ex-item:active { background: rgba(0,229,255,0.08); }
  .ex-item-name { font-size: 14px; color: var(--text); flex: 1; }
  .ex-item-add { color: var(--accent); font-size: 18px; }

  /* ── Summary modal ── */
  .summary-stat-row {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .summary-stat {
    flex: 1; background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .summary-stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px; font-weight: 600; color: var(--accent);
  }
  .summary-stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 3px;
  }
  .pr-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.4);
    border-radius: 6px; padding: 4px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: #fbbf24;
    margin: 2px;
  }
  .summary-exercise { margin-bottom: 14px; }
  .summary-exercise-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 5px;
  }
  .summary-set-list {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted); line-height: 1.8;
  }

  /* ── Template modal ── */
  .text-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text);
    font-family: 'IBM Plex Sans JP', sans-serif;
    font-size: 16px; padding: 12px 14px;
    outline: none; margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--muted); }

  .template-ex-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 6px;
  }
  .template-ex-name { flex: 1; font-size: 13px; color: var(--text); }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* ── Utility ── */
  .hidden { display: none !important; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }

  /* ── Workout complete banner ── */
  .no-workout-hint {
    font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px;
  }

  /* ── Rest timer banner ── */
  .rest-timer-banner {
    position: fixed;
    bottom: calc(var(--nav-height) + var(--safe-bottom));
    left: 0; right: 0;
    background: rgba(10,10,18,0.97);
    border-top: 2px solid var(--accent);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    z-index: 90;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .rest-timer-banner.visible { transform: translateY(0); }
  .rest-timer-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px; font-weight: 600; color: var(--accent);
    min-width: 54px; transition: color 0.3s;
  }
  .rest-timer-time.urgent { color: var(--error); }
  .rest-timer-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    flex: 1;
  }
  .rest-timer-label span { display: block; font-size: 9px; color: rgba(107,107,128,0.7); margin-top: 2px; }
  .rest-timer-controls { display: flex; gap: 5px; align-items: center; }

// ══════════════════════════════════════════
//  DATA LAYER
// ══════════════════════════════════════════

function getExercises()  { return JSON.parse(localStorage.getItem('wt_exercises') || '[]'); }
function getTemplates()  { return JSON.parse(localStorage.getItem('wt_templates') || '[]'); }
function getSessions()   { return JSON.parse(localStorage.getItem('wt_sessions')  || '[]'); }
function getActive()     { return JSON.parse(localStorage.getItem('wt_active')    || 'null'); }

function saveExercises(d) { localStorage.setItem('wt_exercises', JSON.stringify(d)); }
function saveTemplates(d) { localStorage.setItem('wt_templates', JSON.stringify(d)); }
function saveSessions(d)  { localStorage.setItem('wt_sessions',  JSON.stringify(d)); }
function saveActive(d)    { localStorage.setItem('wt_active',    JSON.stringify(d)); }

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function getAllExerciseMap() {
  const map = new Map();
  PRESET_EXERCISES.forEach(e => map.set(e.id, e));
  getExercises().forEach(e => map.set(e.id, e));
  return map;
}

function initExercises() {
  // Custom exercises start empty; presets are always in PRESET_EXERCISES
  // Nothing to seed — presets are always in PRESET_EXERCISES constant
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════

const state = {
  activeTab: 'home',
  timerInterval: null,
  expandedExercises: new Set(),
  expandedHistorySessions: new Set(),
  // For template editing
  editingTemplateId: null,
  templateExerciseIds: [],
  // For add-exercise modal context: 'workout' | 'template'
  addExerciseContext: 'workout',
  // Calendar
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  // Rest timer
  restInterval: null,
  restRemaining: 90,
  restActive: false,
};

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function startTimer(startTimeISO) {
  stopTimer();
  function tick() {
    const el = document.getElementById('workout-timer');
    if (el) el.textContent = formatDuration(Date.now() - new Date(startTimeISO).getTime());
  }
  tick();
  state.timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
}

// ══════════════════════════════════════════
//  REST TIMER
// ══════════════════════════════════════════

function getRestDuration() {
  return parseInt(localStorage.getItem('wt_rest_duration') || '90', 10);
}
function saveRestDuration(secs) {
  localStorage.setItem('wt_rest_duration', String(secs));
}

function startRestTimer() {
  stopRestTimer();
  state.restRemaining = getRestDuration();
  state.restActive = true;
  updateRestTimerDisplay();
  const banner = document.getElementById('rest-timer-banner');
  if (banner) banner.classList.add('visible');
  state.restInterval = setInterval(() => {
    state.restRemaining--;
    updateRestTimerDisplay();
    if (state.restRemaining <= 0) {
      stopRestTimer();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function stopRestTimer() {
  if (state.restInterval) { clearInterval(state.restInterval); state.restInterval = null; }
  state.restActive = false;
  const banner = document.getElementById('rest-timer-banner');
  if (banner) banner.classList.remove('visible');
}

function updateRestTimerDisplay() {
  const el = document.getElementById('rest-timer-time');
  if (!el) return;
  const m = Math.floor(state.restRemaining / 60);
  const s = state.restRemaining % 60;
  el.textContent = `${m}:${String(s).padStart(2, '0')}`;
  el.classList.toggle('urgent', state.restRemaining <= 10 && state.restRemaining > 0);
  // Update default label
  const lbl = document.getElementById('rest-default-label');
  if (lbl) {
    const d = getRestDuration();
    lbl.textContent = `default: ${d >= 60 ? Math.floor(d/60)+'m'+(d%60?String(d%60).padStart(2,'0')+'s':'') : d+'s'}`;
  }
}

function adjustRestTimer(delta) {
  const newDur = Math.max(15, getRestDuration() + delta);
  saveRestDuration(newDur);
  if (state.restActive) {
    state.restRemaining = Math.max(1, state.restRemaining + delta);
    updateRestTimerDisplay();
  }
}

// ══════════════════════════════════════════
//  WORKOUT LIFECYCLE
// ══════════════════════════════════════════

function startWorkout(templateId = null) {
  const existing = getActive();
  if (existing) {
    if (!confirm('You have an active workout. Discard it and start a new one?')) return;
    stopTimer();
  }
  const exMap = getAllExerciseMap();
  let name = 'Workout';
  let exercises = [];

  if (templateId) {
    const tmpl = getTemplates().find(t => t.id === templateId);
    if (tmpl) {
      name = tmpl.name;
      exercises = tmpl.exerciseIds.map(eid => {
        const ex = exMap.get(eid);
        return { exerciseId: eid, name: ex ? ex.name : eid, sets: [] };
      });
    }
  }

  const active = { id: generateId(), name, startTime: new Date().toISOString(), exercises };
  saveActive(active);
  showTab('workout');
}

function discardWorkout() {
  if (!confirm('Discard this workout? All progress will be lost.')) return;
  saveActive(null);
  stopTimer();
  renderWorkoutTab();
  showTab('home');
}

function finishWorkout() {
  const active = getActive();
  if (!active) return;
  // Sync title input value to active
  const titleEl = document.getElementById('workout-title');
  if (titleEl) active.name = titleEl.value.trim() || active.name;
  active.endTime = new Date().toISOString();
  saveActive(active);
  const prs = detectPRs(active);
  renderSummaryModal(active, prs);
  openModal('modal-summary');
}

function saveWorkout(active) {
  const sessions = getSessions();
  sessions.unshift(active);
  saveSessions(sessions);
  saveActive(null);
  stopTimer();
  closeModal('modal-summary');
  state.expandedHistorySessions.clear();
  showTab('history');
}

// ══════════════════════════════════════════
//  ACTIVE WORKOUT MUTATIONS
// ══════════════════════════════════════════

function addExerciseToWorkout(exerciseId) {
  const active = getActive();
  if (!active) return;
  const exMap = getAllExerciseMap();
  const ex = exMap.get(exerciseId);
  if (!ex) return;
  active.exercises.push({ exerciseId, name: ex.name, sets: [] });
  saveActive(active);
  state.expandedExercises.add(active.exercises.length - 1);
  renderExerciseList(active);
}

function removeExerciseFromWorkout(exerciseIdx) {
  const active = getActive();
  if (!active) return;
  active.exercises.splice(exerciseIdx, 1);
  saveActive(active);
  // Rebuild expanded set (indices shifted)
  state.expandedExercises.clear();
  renderExerciseList(active);
}

function addSet(exerciseIdx) {
  const active = getActive();
  if (!active) return;
  const exSets = active.exercises[exerciseIdx].sets;
  const prev = exSets.length > 0 ? exSets[exSets.length - 1] : null;
  exSets.push({ weight: prev ? prev.weight : 0, reps: prev ? prev.reps : 0, done: false });
  saveActive(active);
  renderExerciseCard(exerciseIdx, active);
}

function deleteSet(exerciseIdx, setIdx) {
  const active = getActive();
  if (!active) return;
  active.exercises[exerciseIdx].sets.splice(setIdx, 1);
  saveActive(active);
  renderExerciseCard(exerciseIdx, active);
}

function toggleSetDone(exerciseIdx, setIdx) {
  const active = getActive();
  if (!active) return;
  const set = active.exercises[exerciseIdx].sets[setIdx];
  set.done = !set.done;
  saveActive(active);
  // Update just the set row (no full re-render so inputs stay focused)
  const row = document.querySelector(`.set-row[data-ex="${exerciseIdx}"][data-set="${setIdx}"]`);
  if (row) {
    row.classList.toggle('done', set.done);
    const btn = row.querySelector('.btn-check');
    if (btn) btn.textContent = set.done ? '✓' : '○';
  }
  // Start rest timer when set is marked done
  if (set.done) startRestTimer();
}

function updateSetField(exerciseIdx, setIdx, field, value) {
  const active = getActive();
  if (!active) return;
  active.exercises[exerciseIdx].sets[setIdx][field] = parseFloat(value) || 0;
  saveActive(active);
}

// ══════════════════════════════════════════
//  PR DETECTION
// ══════════════════════════════════════════

function estimated1RM(weight, reps) {
  return weight * (1 + reps / 30);
}

function detectPRs(active) {
  const sessions = getSessions();
  const prs = [];

  active.exercises.forEach(ex => {
    const doneSets = ex.sets.filter(s => s.done && s.weight > 0 && s.reps > 0);
    if (!doneSets.length) return;
    const best = Math.max(...doneSets.map(s => estimated1RM(s.weight, s.reps)));

    // Best historical for this exercise (excluding current)
    let historicalBest = 0;
    sessions.forEach(sess => {
      (sess.exercises || []).forEach(hex => {
        if (hex.exerciseId === ex.exerciseId || hex.name === ex.name) {
          (hex.sets || []).forEach(s => {
            if (s.done && s.weight > 0 && s.reps > 0) {
              historicalBest = Math.max(historicalBest, estimated1RM(s.weight, s.reps));
            }
          });
        }
      });
    });

    if (best > historicalBest) {
      const bestSet = doneSets.reduce((a,b) => estimated1RM(a.weight,a.reps) > estimated1RM(b.weight,b.reps) ? a : b);
      prs.push({ name: ex.name, weight: bestSet.weight, reps: bestSet.reps });
    }
  });
  return prs;
}

function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  document.querySelector(`.bottom-nav button[data-tab="${name}"]`).classList.add('active');
  state.activeTab = name;
  if (name === 'home') renderHomeTab();
  if (name === 'workout') renderWorkoutTab();
  if (name === 'history') renderHistoryTab();
  if (name === 'calendar') renderCalendarTab();
}

function renderHomeTab() {
  // Date
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const el = document.getElementById('home-date');
  if (el) el.textContent = `${days[now.getDay()]} ${now.getMonth()+1}/${now.getDate()}`;

  // Templates

      tList.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:4px 0 8px;">No templates yet. Create one below.</p>';
    } else {
      tList.innerHTML = '';
      templates.forEach(tmpl => {
        const exMap = getAllExerciseMap();
        const exNames = (tmpl.exerciseIds || []).map(id => exMap.get(id)?.name || id);
        const card = document.createElement('div');
        card.className = 'template-card';
        card.innerHTML = `
          <div class="template-card-icon">📋</div>
          <div class="template-card-body">
            <div class="template-card-name">${esc(tmpl.name)}</div>
            <div class="template-card-meta">${exNames.length} exercise${exNames.length!==1?'s':''} · ${exNames.slice(0,3).map(esc).join(', ')}${exNames.length>3?'…':''}</div>
          </div>
          <div class="template-card-actions">
            <button class="btn-icon" title="Edit" data-edit-tmpl="${tmpl.id}">✏️</button>
          </div>`;
        card.addEventListener('click', e => {
          if (e.target.closest('[data-edit-tmpl]')) {

      rList.innerHTML = '';
      sessions.slice(0, 3).forEach(sess => {
        rList.appendChild(buildSessionCard(sess, true));
      });
    }
  }
}

// ══════════════════════════════════════════
//  RENDER: WORKOUT TAB
// ══════════════════════════════════════════

function renderWorkoutTab() {
  const active = getActive();
  const emptyEl = document.getElementById('workout-empty-state');
  const activeEl = document.getElementById('workout-active');
  if (!active) {
    emptyEl.classList.remove('hidden');
    activeEl.classList.add('hidden');
    stopTimer();
    return;
  }
  emptyEl.classList.add('hidden');
  activeEl.classList.remove('hidden');

  const titleEl = document.getElementById('workout-title');
  if (titleEl) titleEl.value = active.name;

  renderExerciseList(active);
  startTimer(active.startTime);
}

function renderExerciseList(active) {
  const list = document.getElementById('exercise-list');
  if (!list) return;
  list.innerHTML = '';
  active.exercises.forEach((_, idx) => {
    const cardEl = buildExerciseCard(idx, active);
    list.appendChild(cardEl);
  });
}

function buildExerciseCard(exerciseIdx, active) {
  const ex = active.exercises[exerciseIdx];
  const isExpanded = state.expandedExercises.has(exerciseIdx);
  const doneSets = ex.sets.filter(s => s.done).length;

  const card = document.createElement('div');
  card.className = 'exercise-card' + (isExpanded ? '' : ' collapsed');
  card.dataset.exIdx = exerciseIdx;

  const header = document.createElement('div');
  header.className = 'exercise-card-header';
  header.innerHTML = `
    <span class="exercise-card-name">${esc(ex.name)}</span>
    <span class="exercise-card-meta">${doneSets}/${ex.sets.length} sets</span>
    <button class="btn-icon" data-remove-ex="${exerciseIdx}" title="Remove" style="margin-left:4px">✕</button>`;
  header.addEventListener('click', e => {
    if (e.target.closest('[data-remove-ex]')) {
      if (confirm(`Remove ${ex.name}?`)) removeExerciseFromWorkout(exerciseIdx);
      return;
    }
    if (state.expandedExercises.has(exerciseIdx)) {
      state.expandedExercises.delete(exerciseIdx);
      card.classList.add('collapsed');
    } else {
      state.expandedExercises.add(exerciseIdx);
      card.classList.remove('collapsed');
    }
  });

  const body = document.createElement('div');
  body.className = 'exercise-card-body';

  // Column headers
  const colHeaders = document.createElement('div');
  colHeaders.className = 'set-col-headers';
  colHeaders.innerHTML = '<span>#</span><span>KG</span><span>REPS</span><span></span>';
  body.appendChild(colHeaders);

  // Set rows
  ex.sets.forEach((set, setIdx) => {
    body.appendChild(buildSetRow(set, setIdx, exerciseIdx));
  });

  // Add set button
  const addSetBtn = document.createElement('button');
  addSetBtn.className = 'btn-add-set';
  addSetBtn.textContent = '+ Add Set';
  addSetBtn.addEventListener('click', () => addSet(exerciseIdx));
  body.appendChild(addSetBtn);

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

// Re-renders just one exercise card in place
function renderExerciseCard(exerciseIdx, active) {
  const list = document.getElementById('exercise-list');
  if (!list) return;
  const existing = list.querySelector(`.exercise-card[data-ex-idx="${exerciseIdx}"]`);
  const newCard = buildExerciseCard(exerciseIdx, active);
  if (existing) {
    list.replaceChild(newCard, existing);
  } else {
    list.appendChild(newCard);
  }
}

function buildSetRow(set, setIdx, exerciseIdx) {
  const row = document.createElement('div');
  row.className = 'set-row' + (set.done ? ' done' : '');
  row.dataset.ex = exerciseIdx;
  row.dataset.set = setIdx;

  // Long-press to delete
  let pressTimer = null;
  row.addEventListener('touchstart', () => {
    pressTimer = setTimeout(() => {
      if (confirm('Delete this set?')) deleteSet(exerciseIdx, setIdx);
    }, 600);
  }, { passive: true });
  row.addEventListener('touchend', () => clearTimeout(pressTimer));
  row.addEventListener('touchmove', () => clearTimeout(pressTimer));

  const numEl = document.createElement('span');
  numEl.className = 'set-number';
  numEl.textContent = setIdx + 1;

  const wInput = document.createElement('input');
  wInput.type = 'number';
  wInput.inputMode = 'decimal';
  wInput.step = 'any';
  wInput.className = 'set-input';
  wInput.value = set.weight || '';
  wInput.placeholder = 'kg';
  wInput.addEventListener('blur', () => updateSetField(exerciseIdx, setIdx, 'weight', wInput.value));

  const rInput = document.createElement('input');
  rInput.type = 'number';
  rInput.inputMode = 'numeric';
  rInput.step = '1';
  rInput.className = 'set-input';
  rInput.value = set.reps || '';
  rInput.placeholder = 'reps';
  rInput.addEventListener('blur', () => updateSetField(exerciseIdx, setIdx, 'reps', rInput.value));

  const checkBtn = document.createElement('button');
  checkBtn.className = 'btn-check';
  checkBtn.textContent = set.done ? '✓' : '○';
  checkBtn.addEventListener('click', () => {
    // Save current input values before toggling
    updateSetField(exerciseIdx, setIdx, 'weight', wInput.value);
    updateSetField(exerciseIdx, setIdx, 'reps', rInput.value);
    toggleSetDone(exerciseIdx, setIdx);
    // Update meta in header
    const active = getActive();
    if (active) {
      const headerMeta = document.querySelector(`[data-ex-idx="${exerciseIdx}"] .exercise-card-meta`);
      if (headerMeta) {
        const done = active.exercises[exerciseIdx].sets.filter(s => s.done).length;
        const total = active.exercises[exerciseIdx].sets.length;
        headerMeta.textContent = `${done}/${total} sets`;
      }
    }
  });

  row.appendChild(numEl);
  row.appendChild(wInput);
  row.appendChild(rInput);
  row.appendChild(checkBtn);
  return row;
}

// ══════════════════════════════════════════
//  RENDER: HISTORY TAB
// ══════════════════════════════════════════

function renderHistoryTab() {
  const sessions = getSessions();
  const list = document.getElementById('history-list');
  if (!list) return;
  if (sessions.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">No history yet</div><div class="empty-state-text">Completed workouts will appear here.</div></div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(sess => list.appendChild(buildSessionCard(sess, false)));
}

function buildSessionCard(sess, compact) {
  const card = document.createElement('div');
  card.className = 'session-card' + (state.expandedHistorySessions.has(sess.id) ? ' expanded' : '');
  card.dataset.sessId = sess.id;

  const d = new Date(sess.startTime);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
  const dayStr = days[d.getDay()];

  let duration = '';
  if (sess.endTime) duration = formatDuration(new Date(sess.endTime) - new Date(sess.startTime));

  let totalSets = 0;
  (sess.exercises || []).forEach(ex => { totalSets += (ex.sets || []).filter(s => s.done).length; });

  const header = document.createElement('div');
  header.className = 'session-card-header';
  header.innerHTML = `
    <span class="session-date">${dateStr}<br><span style="color:var(--muted);font-size:9px">${dayStr}</span></span>
    <div class="session-info">
      <div class="session-name">${esc(sess.name)}</div>
      <div class="session-meta">${duration ? duration + ' · ' : ''}${totalSets} sets · ${(sess.exercises||[]).length} exercises</div>
    </div>
    <span class="session-chevron">›</span>`;

  header.addEventListener('click', () => {
    if (state.expandedHistorySessions.has(sess.id)) {
      state.expandedHistorySessions.delete(sess.id);
      card.classList.remove('expanded');
    } else {
      state.expandedHistorySessions.add(sess.id);
      card.classList.add('expanded');
    }
  });

  const detail = document.createElement('div');
  detail.className = 'session-detail';
  (sess.exercises || []).forEach(ex => {
    const row = document.createElement('div');
    row.className = 'session-exercise-row';
    const doneSets = (ex.sets || []).filter(s => s.done);
    const setChips = doneSets.map(s => `<span class="session-set-chip">${s.weight}×${s.reps}</span>`).join('');
    row.innerHTML = `<div class="session-exercise-name">${esc(ex.name)}</div><div class="session-sets">${setChips || '<span style="font-size:11px;color:var(--muted)">No completed sets</span>'}</div>`;
    detail.appendChild(row);
  });

  card.appendChild(header);
  card.appendChild(detail);
  return card;
}

// ══════════════════════════════════════════
//  RENDER: CALENDAR TAB
// ══════════════════════════════════════════

function renderCalendarTab() {
  const y = state.calYear, m = state.calMonth;
  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];

  const titleEl = document.getElementById('cal-month-title');
  if (titleEl) titleEl.textContent = `${monthNames[m]} ${y}`;

  const sessions = getSessions();

  // Days with workouts in this month
  const workedDays = new Set();
  sessions.forEach(sess => {
    const d = new Date(sess.startTime);
    if (d.getFullYear() === y && d.getMonth() === m) workedDays.add(d.getDate());
  });

  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  grid.innerHTML = '';

  // Day-of-week headers
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const now = new Date();
  const todayY = now.getFullYear(), todayM = now.getMonth(), todayD = now.getDate();
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  // Leading blank cells
  for (let i = 0; i < firstDow; i++) {
    grid.appendChild(Object.assign(document.createElement('div'), {className: 'cal-day'}));
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    let cls = 'cal-day in-month';
    if (workedDays.has(d)) cls += ' worked-out';
    if (y === todayY && m === todayM && d === todayD) cls += ' today';
    cell.className = cls;
    cell.textContent = d;
    grid.appendChild(cell);
  }

  // Stats: workouts this month + current streak
  const monthCount = sessions.filter(s => {
    const d = new Date(s.startTime);
    return d.getFullYear() === y && d.getMonth() === m;
  }).length;

  // Current streak (consecutive days up to today with at least one workout)
  const allWorkedKeys = new Set(sessions.map(s => {
    const d = new Date(s.startTime);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }));
  let streak = 0;
  const check = new Date(todayY, todayM, todayD);
  while (allWorkedKeys.has(`${check.getFullYear()}-${check.getMonth()}-${check.getDate()}`)) {
    streak++;
    check.setDate(check.getDate() - 1);
  }

  const statsEl = document.getElementById('cal-stats');
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="cal-stat">
        <div class="cal-stat-value">${monthCount}</div>
        <div class="cal-stat-label">This Month</div>
      </div>
      <div class="cal-stat">
        <div class="cal-stat-value">${streak}</div>
        <div class="cal-stat-label">Day Streak</div>
      </div>`;
  }
}

// ══════════════════════════════════════════
//  RENDER: SUMMARY MODAL
// ══════════════════════════════════════════

function renderSummaryModal(active, prs) {
  const body = document.getElementById('summary-body');
  if (!body) return;

  const duration = active.endTime ? formatDuration(new Date(active.endTime) - new Date(active.startTime)) : '—';
  let totalVolume = 0, totalSets = 0;
  active.exercises.forEach(ex => {
    ex.sets.filter(s => s.done).forEach(s => {
      totalSets++;
      totalVolume += (s.weight || 0) * (s.reps || 0);
    });
  });

  let html = `
    <div class="summary-stat-row">
      <div class="summary-stat">
        <div class="summary-stat-value">${duration}</div>
        <div class="summary-stat-label">Duration</div>
      </div>
      <div class="summary-stat">
        <div class="summary-stat-value">${totalVolume.toLocaleString()}</div>
        <div class="summary-stat-label">Volume (kg)</div>
      </div>
      <div class="summary-stat">
        <div class="summary-stat-value">${totalSets}</div>
        <div class="summary-stat-label">Sets Done</div>
      </div>
    </div>`;

  if (prs.length > 0) {
    html += `<div style="margin-bottom:14px"><div class="section-label" style="--accent:#fbbf24;color:#fbbf24"><span style="width:3px;height:12px;background:#fbbf24;border-radius:2px;display:block"></span>Personal Records 🏆</div>`;
    prs.forEach(pr => {
      html += `<span class="pr-badge">🏆 ${esc(pr.name)} ${pr.weight}×${pr.reps}</span>`;
    });
    html += '</div>';
  }

  html += '<div class="section-label">Exercises</div>';
  active.exercises.forEach(ex => {
    const doneSets = ex.sets.filter(s => s.done);
    html += `<div class="summary-exercise">
      <div class="summary-exercise-name">${esc(ex.name)}</div>
      <div class="summary-set-list">${doneSets.length ? doneSets.map((s,i) => `Set ${i+1}: ${s.weight} kg × ${s.reps}`).join('<br>') : 'No completed sets'}</div>
    </div>`;
  });

  html += `
    <div class="divider"></div>
    <button class="btn-primary" id="btn-save-workout"><div class="shimmer"></div>Save Workout</button>
    <button class="btn-danger mt8" id="btn-discard-after-summary">Discard</button>`;

  body.innerHTML = html;

  document.getElementById('btn-save-workout').addEventListener('click', () => saveWorkout(active));
  document.getElementById('btn-discard-after-summary').addEventListener('click', () => {
    if (confirm('Discard this workout?')) {
      saveActive(null);
      stopTimer();
      closeModal('modal-summary');
      showTab('home');
    }
  });
}

// ══════════════════════════════════════════
//  RENDER: ADD EXERCISE MODAL
// ══════════════════════════════════════════

function openAddExercise(context) {
  state.addExerciseContext = context;
  renderAddExerciseList('');
  openModal('modal-add-exercise');
  setTimeout(() => document.getElementById('ex-search')?.focus(), 300);
}

function renderAddExerciseList(query) {
  const allExercises = [...PRESET_EXERCISES, ...getExercises()];
  const q = query.toLowerCase().trim();
  const filtered = q ? allExercises.filter(e => e.name.toLowerCase().includes(q)) : allExercises;

  // If in template context, filter out already-added ones
  let alreadyAdded = new Set();
  if (state.addExerciseContext === 'template') {
    state.templateExerciseIds.forEach(id => alreadyAdded.add(id));
  }

  const container = document.getElementById('ex-list');
  if (!container) return;
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:8px 0">No exercises found.</p>';
    return;
  }

  const grouped = {};
  filtered.forEach(ex => {
    if (!grouped[ex.category]) grouped[ex.category] = [];
    grouped[ex.category].push(ex);
  });

  CATEGORIES.forEach(cat => {
    if (!grouped[cat] || grouped[cat].length === 0) return;
    const label = document.createElement('div');
    label.className = 'ex-category-label';
    label.textContent = cat;
    container.appendChild(label);

    grouped[cat].forEach(ex => {
      const item = document.createElement('div');
      item.className = 'ex-item';
      item.innerHTML = `<span class="ex-item-name">${esc(ex.name)}${alreadyAdded.has(ex.id) ? ' <span style="color:var(--muted);font-size:11px">(added)</span>' : ''}</span><span class="ex-item-add">+</span>`;
      item.addEventListener('click', () => {
        if (state.addExerciseContext === 'workout') {
          addExerciseToWorkout(ex.id);
          closeModal('modal-add-exercise');
        } else if (state.addExerciseContext === 'template') {
          if (!alreadyAdded.has(ex.id)) {
            state.templateExerciseIds.push(ex.id);
            closeModal('modal-add-exercise');
            openTemplateEditor(state.editingTemplateId, false);
          }
        }
      });
      container.appendChild(item);
    });
  });
}

// ══════════════════════════════════════════
//  TEMPLATE EDITOR MODAL
// ══════════════════════════════════════════

function openTemplateEditor(templateId = null, resetExercises = true) {
  const templates = getTemplates();
  const existing = templateId ? templates.find(t => t.id === templateId) : null;
  state.editingTemplateId = templateId;
  if (resetExercises) {
    state.templateExerciseIds = existing ? [...(existing.exerciseIds || [])] : [];
  }

  document.getElementById('template-modal-title').textContent = existing ? 'Edit Template' : 'New Template';
  document.getElementById('template-name-input').value = existing ? existing.name : '';

  const exMap = getAllExerciseMap();
  const exListEl = document.getElementById('template-ex-list');
  exListEl.innerHTML = '';
  state.templateExerciseIds.forEach((eid, i) => {
    const ex = exMap.get(eid);
    const item = document.createElement('div');
    item.className = 'template-ex-item';
    item.innerHTML = `<span class="template-ex-name">${esc(ex ? ex.name : eid)}</span>`;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn-icon';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => {
      state.templateExerciseIds.splice(i, 1);
      openTemplateEditor(state.editingTemplateId, false);
    });
    item.appendChild(removeBtn);
    exListEl.appendChild(item);
  });

  const deleteWrap = document.getElementById('template-delete-wrap');
  if (existing) deleteWrap.classList.remove('hidden');
  else deleteWrap.classList.add('hidden');

  openModal('modal-template');
}

function saveTemplate() {
  const name = document.getElementById('template-name-input').value.trim();
  if (!name) { alert('Please enter a template name.'); return; }
  const templates = getTemplates();
  if (state.editingTemplateId) {
    const idx = templates.findIndex(t => t.id === state.editingTemplateId);
    if (idx >= 0) templates[idx] = { id: state.editingTemplateId, name, exerciseIds: [...state.templateExerciseIds] };
  } else {
    templates.push({ id: generateId(), name, exerciseIds: [...state.templateExerciseIds] });
  }
  saveTemplates(templates);
  closeModal('modal-template');
  renderHomeTab();
}

function deleteTemplate(id) {
  if (!confirm('Delete this template?')) return;
  const templates = getTemplates().filter(t => t.id !== id);
  saveTemplates(templates);
  closeModal('modal-template');
  renderHomeTab();
}

// ══════════════════════════════════════════
//  MODAL CONTROLLERS
// ══════════════════════════════════════════

function openModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('open');
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}

// ══════════════════════════════════════════
//  UTILITY
// ══════════════════════════════════════════

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
//  INIT & EVENT WIRING
// ══════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {

  // Bottom nav
  document.querySelectorAll('.bottom-nav button[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.tab));
  });

  // Start workout buttons
  document.getElementById('btn-start-blank').addEventListener('click', () => startWorkout());
  document.getElementById('btn-start-blank-2').addEventListener('click', () => startWorkout());

  // New template
  document.getElementById('btn-new-template').addEventListener('click', () => openTemplateEditor(null));

  // Workout tab buttons
  document.getElementById('btn-finish').addEventListener('click', finishWorkout);
  document.getElementById('btn-discard').addEventListener('click', discardWorkout);
  document.getElementById('btn-add-exercise').addEventListener('click', () => openAddExercise('workout'));

  // Workout title blur save
  document.getElementById('workout-title').addEventListener('blur', () => {
    const active = getActive();
    if (active) {
      active.name = document.getElementById('workout-title').value.trim() || active.name;
      saveActive(active);
    }
  });

  // Exercise search
  document.getElementById('ex-search').addEventListener('input', e => {
    renderAddExerciseList(e.target.value);
  });

  // Create custom exercise
  document.getElementById('btn-create-custom').addEventListener('click', () => {
    const name = prompt('Exercise name:');
    if (!name || !name.trim()) return;
    const catOptions = CATEGORIES.join(', ');
    let cat = prompt(`Category (${catOptions}):`);
    if (!cat || !CATEGORIES.includes(cat)) cat = 'Other';
    const ex = { id: generateId(), name: name.trim(), category: cat };
    const exercises = getExercises();
    exercises.push(ex);
    saveExercises(exercises);
    if (state.addExerciseContext === 'workout') {
      addExerciseToWorkout(ex.id);
      closeModal('modal-add-exercise');
    } else {
      state.templateExerciseIds.push(ex.id);
      closeModal('modal-add-exercise');
      openTemplateEditor(state.editingTemplateId, false);
    }
  });

  // Template modal
  document.getElementById('btn-save-template').addEventListener('click', saveTemplate);
  document.getElementById('btn-delete-template').addEventListener('click', () => deleteTemplate(state.editingTemplateId));
  document.getElementById('btn-template-add-ex').addEventListener('click', () => {
    closeModal('modal-template');
    openAddExercise('template');
  });

  // Tap outside modal to close
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });

  // Calendar navigation
  document.getElementById('cal-prev').addEventListener('click', () => {
    state.calMonth--;
    if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
    renderCalendarTab();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    state.calMonth++;
    if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
    renderCalendarTab();
  });

  // Rest timer controls
  document.getElementById('rest-minus').addEventListener('click', () => adjustRestTimer(-15));
  document.getElementById('rest-plus').addEventListener('click',  () => adjustRestTimer(15));
  document.getElementById('rest-skip').addEventListener('click',  stopRestTimer);

  // Resume active workout if exists
  const active = getActive();
  if (active) {
    // Pre-expand all exercises
    active.exercises.forEach((_, i) => state.expandedExercises.add(i));
  }

  // Initial render
  renderHomeTab();
});
</script>
</body>
</html>
